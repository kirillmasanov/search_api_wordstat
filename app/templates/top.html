{% extends "base.html" %}
{% set active = "top" %}
{% block title %}Подбор слов{% endblock %}

{% block content %}
<section class="search-section">
    <form id="top-form" class="search-form">
        <div class="search-row">
            <input type="text" name="phrase" placeholder="Введите запрос" required autofocus>
            <button type="submit">Подобрать</button>
        </div>
        <details class="filters">
            <summary>Фильтры</summary>
            <div class="filter-row">
                <label>Результатов:
                    <input type="number" name="num_phrases" value="50" min="1" max="2000">
                </label>
                <div class="custom-select" data-name="devices">
                    <div class="custom-select__trigger"><span>Все устройства</span><svg width="10" height="6" viewBox="0 0 10 6"><path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.5" fill="none"/></svg></div>
                    <div class="custom-select__dropdown">
                        <div class="custom-select__option selected" data-value="">Все устройства</div>
                        <div class="custom-select__option" data-value="DEVICE_DESKTOP">Десктоп</div>
                        <div class="custom-select__option" data-value="DEVICE_PHONE">Телефон</div>
                        <div class="custom-select__option" data-value="DEVICE_TABLET">Планшет</div>
                    </div>
                    <input type="hidden" name="devices" value="">
                </div>
            </div>
        </details>
    </form>
</section>

<section id="top-results" class="results hidden">
    <div class="total-count">Всего показов за месяц: <strong id="total-count-value"></strong></div>
    <div class="tables-row">
        <div class="table-block">
            <h3>Что искали со словом</h3>
            <table id="results-table">
                <thead><tr><th>Запрос</th><th>Показов</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
        <div class="table-block">
            <h3>Похожие запросы</h3>
            <table id="associations-table">
                <thead><tr><th>Запрос</th><th>Показов</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</section>

<div id="loading" class="loading hidden">Загрузка...</div>
<div id="error" class="error hidden"></div>
{% endblock %}
