{% extends "base.html" %}
{% set active = "regions" %}
{% block title %}По регионам{% endblock %}

{% block content %}
<section class="search-section">
    <form id="regions-form" class="search-form">
        <div class="search-box">
            <input type="text" name="phrase" placeholder="Введите слово или словосочетание" required autofocus autocomplete="off">
            <span class="search-clear hidden" aria-label="Очистить"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></span>
            <button type="submit" aria-label="Найти"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="10.5" cy="10.5" r="7" stroke="currentColor" stroke-width="2"/><path d="M15.5 15.5L21 21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></button>
        </div>
        <div class="filter-row">
            <div class="custom-select" data-name="region_type">
                <div class="custom-select__trigger"><span>Все</span><svg width="10" height="6" viewBox="0 0 10 6"><path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.5" fill="none"/></svg></div>
                <div class="custom-select__dropdown">
                    <div class="custom-select__option selected" data-value="">Все</div>
                    <div class="custom-select__option" data-value="REGION_CITIES">Города</div>
                    <div class="custom-select__option" data-value="REGION_REGIONS">Регионы</div>
                </div>
                <input type="hidden" name="region_type" value="">
            </div>
            <div class="custom-select" data-name="devices">
                <div class="custom-select__trigger"><span>Все устройства</span><svg width="10" height="6" viewBox="0 0 10 6"><path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.5" fill="none"/></svg></div>
                <div class="custom-select__dropdown">
                    <div class="custom-select__option selected" data-value="">Все устройства</div>
                    <div class="custom-select__option" data-value="DEVICE_DESKTOP">Десктоп</div>
                    <div class="custom-select__option" data-value="DEVICE_PHONE">Телефон</div>
                    <div class="custom-select__option" data-value="DEVICE_TABLET">Планшет</div>
                </div>
                <input type="hidden" name="devices" value="">
            </div>
        </div>
    </form>
</section>

<section id="regions-results" class="results hidden">
    <table id="regions-table" class="sortable">
        <thead>
            <tr>
                <th data-sort="region">Регион</th>
                <th data-sort="count">Показов</th>
                <th data-sort="share">Региональная доля, %</th>
                <th data-sort="affinity">Индекс аффинитивности</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</section>

<div id="loading" class="loading hidden">Загрузка...</div>
<div id="error" class="error hidden"></div>
{% endblock %}
