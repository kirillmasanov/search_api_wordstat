{% extends "base.html" %}
{% set active = "dynamics" %}
{% block title %}Динамика{% endblock %}

{% block content %}
<section class="search-section">
    <form id="dynamics-form" class="search-form">
        <div class="search-row">
            <input type="text" name="phrase" placeholder="Введите запрос" required autofocus>
            <button type="submit">Показать</button>
        </div>
        <div class="filter-row">
            <label>Период:
                <select name="period">
                    <option value="PERIOD_WEEKLY" selected>По неделям</option>
                    <option value="PERIOD_DAILY">По дням</option>
                    <option value="PERIOD_MONTHLY">По месяцам</option>
                </select>
            </label>
            <label>С:
                <input type="date" name="from_date" required>
            </label>
            <label>По:
                <input type="date" name="to_date">
            </label>
        </div>
        <details class="filters">
            <summary>Фильтры</summary>
            <div class="filter-row">
                <label>Устройства:
                    <select name="devices">
                        <option value="">Все</option>
                        <option value="DEVICE_DESKTOP">Десктоп</option>
                        <option value="DEVICE_PHONE">Телефон</option>
                        <option value="DEVICE_TABLET">Планшет</option>
                    </select>
                </label>
            </div>
        </details>
    </form>
</section>

<section id="dynamics-results" class="results hidden">
    <div class="chart-container">
        <canvas id="dynamics-chart"></canvas>
    </div>
    <table id="dynamics-table">
        <thead><tr><th>Дата</th><th>Показов</th><th>Доля</th></tr></thead>
        <tbody></tbody>
    </table>
</section>

<div id="loading" class="loading hidden">Загрузка...</div>
<div id="error" class="error hidden"></div>
{% endblock %}
