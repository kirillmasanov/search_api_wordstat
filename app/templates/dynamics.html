{% extends "base.html" %}
{% set active = "dynamics" %}
{% block title %}Динамика{% endblock %}

{% block content %}
<section class="search-section">
    <form id="dynamics-form" class="search-form">
        <div class="search-row">
            <input type="text" name="phrase" placeholder="Введите запрос" required autofocus>
            <button type="submit">Показать</button>
        </div>
        <div class="filter-row">
            <div class="custom-select" data-name="period">
                <div class="custom-select__trigger"><span>По неделям</span><svg width="10" height="6" viewBox="0 0 10 6"><path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.5" fill="none"/></svg></div>
                <div class="custom-select__dropdown">
                    <div class="custom-select__option" data-value="PERIOD_DAILY">По дням</div>
                    <div class="custom-select__option selected" data-value="PERIOD_WEEKLY">По неделям</div>
                    <div class="custom-select__option" data-value="PERIOD_MONTHLY">По месяцам</div>
                </div>
                <input type="hidden" name="period" value="PERIOD_WEEKLY">
            </div>
            <label>С:
                <input type="date" name="from_date" required>
            </label>
            <label>По:
                <input type="date" name="to_date">
            </label>
        </div>
        <details class="filters">
            <summary>Фильтры</summary>
            <div class="filter-row">
                <div class="custom-select" data-name="devices">
                    <div class="custom-select__trigger"><span>Все устройства</span><svg width="10" height="6" viewBox="0 0 10 6"><path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.5" fill="none"/></svg></div>
                    <div class="custom-select__dropdown">
                        <div class="custom-select__option selected" data-value="">Все устройства</div>
                        <div class="custom-select__option" data-value="DEVICE_DESKTOP">Десктоп</div>
                        <div class="custom-select__option" data-value="DEVICE_PHONE">Телефон</div>
                        <div class="custom-select__option" data-value="DEVICE_TABLET">Планшет</div>
                    </div>
                    <input type="hidden" name="devices" value="">
                </div>
            </div>
        </details>
    </form>
</section>

<section id="dynamics-results" class="results hidden">
    <div class="chart-container">
        <canvas id="dynamics-chart"></canvas>
    </div>
    <table id="dynamics-table">
        <thead><tr><th>Дата</th><th>Показов</th><th>Доля</th></tr></thead>
        <tbody></tbody>
    </table>
</section>

<div id="loading" class="loading hidden">Загрузка...</div>
<div id="error" class="error hidden"></div>
{% endblock %}
