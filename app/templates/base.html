<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordstat — {% block title %}{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>
<body>
    <header>
        <div class="header-inner">
            <a href="/" class="logo">
                <svg class="logo-icon" width="24" height="24" viewBox="0 0 32 32" fill="none"><g fill="#2A9FFF" clip-path="url(#yc)"><path d="M23.858 27.431c-2.813 1.925-6.204 1.825-13.01 1.866l-5.403-.01 2.734-7.363 4.05-.007c3.295.007 5.26-.243 6.86-1.387 1.555-1.114 2.503-2.828 3.642-5.92l1.415-3.794L32 10.812l-1.885 5.049c-2.39 6.388-3.475 9.602-6.257 11.57M8.142 4.608c2.813-1.925 6.204-1.825 13.01-1.865l5.403.009-2.733 7.363-4.051.008c-3.294-.008-5.26.242-6.86 1.386-1.555 1.115-2.503 2.828-3.642 5.92l-1.415 3.795L0 21.227l1.885-5.048C4.275 9.79 5.36 6.576 8.142 4.609"/></g><defs><clipPath id="yc"><path fill="#fff" d="M0 0h32v32H0z"/></clipPath></defs></svg>
                <span class="logo-text">Wordstat</span>
            </a>
            <nav class="tabs">
                <a href="/top" class="tab {% if active == 'top' %}active{% endif %}">Подбор слов</a>
                <a href="/dynamics" class="tab {% if active == 'dynamics' %}active{% endif %}">Динамика</a>
                <a href="/regions" class="tab {% if active == 'regions' %}active{% endif %}">По регионам</a>
            </nav>
        </div>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
    <script src="/static/app.js"></script>
</body>
</html>
