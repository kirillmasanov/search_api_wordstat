<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordstat — {% block title %}{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>
<body>
    <header>
        <div class="header-inner">
            <a href="/" class="logo">
                <svg class="logo-icon" width="24" height="24" viewBox="0 0 24 24" fill="none">
                    <rect width="24" height="24" rx="6" fill="#597BFF"/>
                    <path d="M7 17V7h3.5c1.1 0 2 .3 2.6.9.6.6.9 1.3.9 2.2 0 .6-.2 1.2-.5 1.6-.3.5-.8.8-1.4 1L15 17h-2.3l-2.5-4.5H9.5V17H7zm2.5-6.3h1.2c.5 0 .8-.1 1.1-.4.3-.3.4-.6.4-1s-.1-.7-.4-1c-.3-.3-.6-.4-1.1-.4H9.5v2.8z" fill="white"/>
                </svg>
                <span class="logo-text">Wordstat</span>
            </a>
            <nav class="tabs">
                <a href="/top" class="tab {% if active == 'top' %}active{% endif %}">Подбор слов</a>
                <a href="/dynamics" class="tab {% if active == 'dynamics' %}active{% endif %}">Динамика</a>
                <a href="/regions" class="tab {% if active == 'regions' %}active{% endif %}">По регионам</a>
            </nav>
        </div>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
    <script src="/static/app.js"></script>
</body>
</html>
